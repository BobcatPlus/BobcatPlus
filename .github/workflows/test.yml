name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run unit tests
        run: node tests/unit/run.js
        env:
          # Tests that need OpenAI are skipped without this; CI runs the
          # deterministic core suite. See tests/unit/_harness.js for
          # the convention.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
